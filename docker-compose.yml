services:
  redsocial_go:
    image: postgres:18-alpine
    container_name: redsocial_go_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: redsocial
    ports:
      - "5440:5432"
    volumes:
      - redsocial_go_data:/var/lib/postgresql/data

volumes:
  redsocial_go_data:
